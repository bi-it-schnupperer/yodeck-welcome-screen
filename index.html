<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <title>yodeck-welcome-screen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Template CSS -->
  <link href="css/template.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>

    /* ===========================
   CSS Variables
   =========================== */
:root {

    /* Hintergrundfarben*/ 
  --default: #F2F2F2;
  --red: #E66446;
  --orange: #EB9646;
  --blue: #8CAADC;
  --green: #87C85A;
  --yellow: #E6BE6E;
  --darkgray: #9C9E9F;

   /* Textfarben*/ 
  --dark: #222;
  --white:#FFF;
  --red: #E66446;
 
    }


    body {
      /* Hintergrundfarbe für den Screen festlegen */ /*Kommentar: Hier kannst du eine Änderung vornehmen */
        background-color: var(--red);
    }

    .welcome-card {
      /* Hintergrundfarbe festlegen */ /*Kommentar: Hier kannst du eine Änderung vornehmen */
      background: var(--orange);
      /* Textfarbe festlegen */ /*Kommentar: Hier kannst du eine Änderung vornehmen */
      color: var(--dark);
    }

    .icon {
      color: var(--default);

    }

    .info-box {
  /* Textfarbe festlegen (Infoboxen - linke Reihe) */ /*Kommentar: Hier kannst du eine Änderung vornehmen */
    background: var(--default);
  /* Boxfarbe festlegen - linke Reihe */ /*Kommentar: Hier kannst du eine Änderung vornehmen */
    color: var(--darkgray);
   }

    
      

  </style>
</head>

<body>

  <div class="container-fluid screen">
    <div class="content-wrapper fade-in">

      <!-- LINKER BEREICH -->
      <div class="info-column">

        <div class="info-box">
          <h2>Götti</h2>
          <p>
            Petra Musterfrau
          </p>
           <p>Text</p>
        </div>

        <div class="info-box">
          <h2>Arbeitstage</h2>
          <p>
            Mo. bis Mi.
          </p>
        </div>

        <div class="info-box">
          <h2>Arbeitszeit</h2>
          <p>
            8 - 15 Uhr
          </p>
        </div>

        <div class="info-box">
          <h2>Pausen</h2>
          <ul>
            <li>Morgen: 10:00 - 10:15</li>
            <li>Mittag: 11:55 - 13:00</li>
          </ul>
        </div>

      </div>

      <!-- RECHTER BEREICH -->
      <div class="welcome-card">

        <div class="icon">
          <i class="bi bi-person"></i>
        </div>

        <h1>
          Willkommen
        </h1>

        <div class="name">
          Max Mustermann
        </div>

        <div class="subtitle">
          Schön, dass du heute als
          <strong>Schnupperer</strong>
          bei uns bist
        </div>

      </div>

    </div>
  </div>

</body>

</html>
