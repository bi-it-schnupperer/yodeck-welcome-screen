<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <title>yodeck-welcome-screen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Template CSS -->
  <link href="css/template.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>

    /* ===========================
   CSS Variables
   =========================== */
:root {

    /* Hintergrundfarben*/ 
  --lightblue: #61c6ed;
  --red: #E66446;
  --violet: #fc90ea;
  --blue: #8CAADC;
  --green: #87C85A;
  --yellow: #E6BE6E;
  --darkgray: #9C9E9F;

   /* Textfarben*/ 
  --black: #000;
  --white:#FFF;
  --red: #E66446;
 
    }


    body {
      /* 1. Hintergrundfarbe für den Screen festlegen */ 
        background-color: var(--lightblue);
    }

    .welcome-card {
      /* 2. Hintergrundfarbe festlegen */ 
      background: var(--violet);
      /* 3. Textfarbe festlegen */ 
      color: var(--white);
    }

    .icon {
      /* 4. Textfarbe festlegen */ 
      color: var(--red);

    }

    .info-box {
   /* 5. Boxfarbe festlegen - linke Reihe */ 
    background: var(--darkgray);
 /* 6. Textfarbe festlegen (Infoboxen - linke Reihe) */ 
    color: var(--black);
   }


  </style>
</head>

<body>

  <div class="container-fluid screen">
    <div class="content-wrapper fade-in">

      <!-- LINKER BEREICH -->
      <div class="info-column">

    
        <div class="info-box">
          <h2>Götti</h2>
          <!-- 7. Gemäss Fachperson -->
          <p>Gemäss Fachperson
            
          </p>
        </div>

        <div class="info-box">
          <h2>Arbeitstage</h2>
          <p>
           <!-- 8. Gemäss Fachperson -->
            Mo. bis Mi.
          </p>
        </div>

        <div class="info-box">
          <h2>Arbeitszeit</h2>
          <p>
             <!-- 9. Gemäss Fachperson -->
            8 - 15 Uhr
          </p>
        </div>

        <div class="info-box">
          <h2>Pausen</h2>
          <ul>
             <!-- 10. Gemäss Fachperson -->
            <li>Morgen: 10:00 - 10:15</li>
             <!-- 11. Gemäss Fachperson -->
            <li>Mittag: 11:55 - 13:00</li>
          </ul>
        </div>

      </div>

      <!-- RECHTER BEREICH -->
      <div class="welcome-card">

        <div class="icon">
          <i class="bi bi-person"></i>
        </div>

        <h1>
           <!-- 12. Gemäss Fachperson -->
          Willkommen
        </h1>

        <div class="name">
           <!-- 13. Gemäss Fachperson -->
          Miro Kaminski
        </div>

         <!-- 14. Gemäss Fachperson -->
        <div class="subtitle">
          Schön, dass du heute als
          <strong>Schnupperer</strong>
          bei uns bist!
        </div>

      </div>

    </div>
  </div>

</body>

</html>
