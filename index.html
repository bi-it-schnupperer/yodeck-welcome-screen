<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Willkommen</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
       html, body {
    width: 100%;
    height: 100%;
    margin: 0;
}

body {
    background:
        linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.45)),
        url(img/background.png);

    background-repeat: no-repeat;
    background-position: center center;
    background-size: cover;

    font-family: "Segoe UI", system-ui, sans-serif;
}


        .screen {
            height: 100vh;
        }

        .welcome-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 4rem 5rem;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            color: #fff;
            max-width: 900px;
        }

        .icon {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            color: #ffffff;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
        }

        .name {
            font-size: 3rem;
            font-weight: 600;
            margin-top: 1rem;
            color: #ffe082;
        }

        .subtitle {
            font-size: 1.8rem;
            margin-top: 3rem;
            opacity: 0.95;
        }

        .fade-in {
            animation: fadeIn 1.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container-fluid screen d-flex align-items-center justify-content-center">
    <div class="welcome-card text-center fade-in">

        <div class="icon">
            <i class="bi bi-person-check-fill"></i>
        </div>

        <h1>Herzlich willkommen</h1>

        <div class="name">Max Mustermann</div>

        <div class="subtitle">
            Schön, dass du heute als <strong>Schnupperer</strong> bei uns bist.
        </div>

    </div>
</div>

</body>
</html>
