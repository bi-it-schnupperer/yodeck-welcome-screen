<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <title>yodeck-welcome-screen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Template CSS -->
  <link href="css/template.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>

    .welcome-card {
      /* Hintergrundfarbe festlegen */
      background: rgb(52, 64, 221);
      /* Textfarbe */
      color: white;
    
    }

    h1 {
     /* Titel: Schriftgrösse */
      font-size: 60px;
      /* Titel: Schriftstärke */
      font-weight: 700;
    }

    .name {
     /* Schriftgrösse */
      font-size: 50px;
     /* Schriftstärke */
      font-weight: 600;
      /* Farbe*/
      color: rgb(223, 91, 15);
    }

  
  </style>
</head>

<body>

  <div class="container-fluid screen d-flex align-items-center justify-content-center">
    <div class="fade-in">

      <div class="welcome-card">


        <div class="icon">
          <i class="bi bi-person"></i>
        </div>

        <h1>
          <!-- Hier Titel einfügen: z.B. Herzlich Willkommen -->
          Herzlich Willkommen in der ESPAS Stiftung
        </h1>

        <div class="name">
          <!-- Hier Name des nächsten Schnupperers einfügen-->
          Max Mustermann
        </div>

        <div class="subtitle">
          <!-- Welcome Text: z.B. Schön, dass du heute als <strong>Schnupperer</strong> bei uns bist. -->
         Schön, dass du heute als Schnupperer bei uns bist. Wir freuen uns.
        </div>

      </div>

    </div>
  </div>

</body>

</html>
