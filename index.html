<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <title>yodeck-welcome-screen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Template CSS -->
  <link href="css/template.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

    /* Verfügbare Farben */

    /* Die Farbe einsetzen:
       z.B: background: var(--blue);
    */

    :root {
        /* Base */
        --light: #e6e6e6;
        --dark: #212529;

        /* Primary Colors */
        --blue: #008cba;
        --green: #28a745;
        --cyan: #17a2b8;
        --yellow: #ffc107;
        --red: #d9534f;

        /* Additional Colors */
        --purple: #6f42c1;
        --pink: #e83e8c;
        --orange-dark: #fd7e14;
        --teal: #20c997;
        --lime: #84cc16;
    }

    .welcome-card {
        /* Hintergrundfarbe */
        background: var(--blue);

        /* Textfarbe */
        color: var(--light);
    }

    h1 {
        /* Titel: Schriftgrösse */
        font-size: 50px;

        /* Titel: Schriftstärke */
        font-weight: 600;
    }

    .name {
        /* Schriftgrösse */
        font-size: 50px;

        /* Schriftstärke */
        font-weight: 600;

        /* Farbe */
        color: rgb(255, 204, 0);
    }

</style>
</head>

<body>

  <!-- Logo oben rechts -->
  <img src="img/logo.png" class="logo-top-right" alt="Logo">

  <div class="container-fluid screen d-flex align-items-center justify-content-center">
    <div class="fade-in">

      <div class="welcome-card">


        <div class="icon">
          <i class="bi bi-person"></i>
        </div>

        <h1>
          <!-- Hier Titel einfügen: z.B. Herzlich Willkommen -->
          Herzlich Willkommen in der ESPAS
        </h1>

        <div class="name">
          <!-- Hier Name des nächsten Schnupperers einfügen-->
          Max Mustermann
        </div>

        <div class="subtitle">
          <!-- Welcome Text: z.B. Schön, dass du heute als <strong>Schnupperer</strong> bei uns bist. -->
         Schön, dass du heute als Schnupperer bei uns bist.
        </div>

      </div>

    </div>
  </div>

</body>

</html>
